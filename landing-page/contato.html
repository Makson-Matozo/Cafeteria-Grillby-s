<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Grillby's</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- CABEÇALHO -->
    <div class="cabecalho">
        <div class="topo">
            <img src="../img/logo.png" class="logo">

            <div class="barraPesquisa">
                <input type="text" placeholder="Buscar..." class="pesquisa">
                <button><i class="fas fa-shopping-cart"></i></button>
            </div>
        </div>

        <nav class="menu">
            <ul class="lista">
                <li><a href="index.html">Home</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="planos.html">Planos</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </div>

    <!-- CONTATO -->
    <section class="contato">
        <h1>Fale com o Grillby's</h1>
        <p class="sub">Alguma dúvida ou pedido especial? Envie uma mensagem </p>

        <form class="formContato">
            <input type="text" placeholder="Seu nome" required>
            <input type="email" placeholder="Seu email" required>
            <input type="tel" placeholder="Seu telefone" required>
                <select>
                    <option value="">Selecione</option>
                    <option value="duvida">Dúvida</option>
                    <option value="pedido">Pedido</option>
                    <option value="suporte">Suporte</option>
                </select>
            <textarea placeholder="Digite sua mensagem..." required></textarea>
            <button type="submit">Enviar Mensagem</button>
        </form>

        <div class="infoContato">
            <p><strong>📍 Endereço:</strong> Rua do Subsolo, 123</p>
            <p><strong>📞 Telefone:</strong> (11) 9999-9999</p>
            <p><strong>📧 Email:</strong> contato@grillbys.com</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Grillby's. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>

</html>
