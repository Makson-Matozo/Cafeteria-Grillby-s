<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos - Grillby's</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="conteudo">

        <!-- CABEÇALHO -->
        <div class="cabecalho">

            <div class="topo">
                <img src="../img/logo.png" alt="Logo da Cafeteria Grillby's" class="logo">

                <div class="barraPesquisa">
                    <input type="text" placeholder="Pesquisar..." class="pesquisa">
                    <button>
                        <i class="fas fa-shopping-cart" id="carinho"></i>
                    </button>
                </div>
            </div>

            <div class="menu">
                <ul class="lista">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="planos.html">Planos</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </div>

        </div>

        <!-- PLANOS -->
        <div class="conteudoPlanos">
            <h2>Comparação de Planos </h2>

            <table class="tabelaPlanos">
                <thead>
                    <tr>
                        <th>Plano</th>
                        <th>Benefícios</th>
                        <th>Preço</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Básico</td>
                        <td>1 café por dia</td>
                        <td>R$ 29,90</td>
                    </tr>

                    <tr>
                        <td>Determinação</td>
                        <td>2 cafés por dia + 10% desconto</td>
                        <td>R$ 49,90</td>
                    </tr>

                    <tr>
                        <td>Grillby </td>
                        <td>Cafés ilimitados + 20% desconto + prioridade</td>
                        <td>R$ 79,90</td>
                    </tr>
                </tbody>
            </table>

        </div>

        <!-- FOOTER -->
        <footer class="footer">
            <div class="footer-bottom">
                <p>&copy; 2026 Grillby's. Todos os direitos reservados.</p>
            </div>
        </footer>

    </div>
</body>

</html>
